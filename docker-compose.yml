services:
  web-server:
    image: httpd:2.4
    container_name: apache
    ports:
      - "80:80"
    networks:
      - server-network
    volumes:
      - ./web/:/usr/local/apache2/htdocs/:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "httpd", "-t" ]
      interval: 10s
      timeout: 15s
      retries: 3


  fastapi-service:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: fastapi-service-parser
    ports:
      - "127.0.0.1:8000:8000"
#    env_file:
#      - .env
    networks:
      - server-network
#    volumes:
#      - ./backend/src:/fastapi-service/src  # для горячей перезагрузки при разработке
    depends_on:
      web-server:
        condition: service_healthy
    restart: unless-stopped

networks:
  server-network:
    driver: bridge
