<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Сравнение файлов и данных</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <div class="content">
        <header>
            <h1>Загрузите файлы</h1>
            <p>Вставьте файлы с учебным планом</p>
        </header> 
        <div class="conteiner">
            <p>Поддерживаются любые форматы (max.50 МБ)</p>
            <input type="file" id="fileInput" accept="*/*">
        </div>
        <div class="conteiner">
            <button class="submitBtn" id="submitBtn">Отправить</button>
        </div>
    </div>
    
</body>
</html>
