<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Сравнение файлов и данных</title>
        <link rel="stylesheet" href="css/global.css">
    </head>
    <body>
        <header class="main">
            <a href="https://mauniver.ru/" ><img class="head" src="pic/logo.PNG" alt="Главная страница"></a>
            <div class="right">
                
            </div>
        </header>
        <div class="content">
            <header>
                <h1>Загрузите данные</h1>
                <p>Вставьте файл с учебным планом и ссылку страницы с данными</p>
            </header>
            <div class="conteiner">
                <p>Поддерживаются форматы .plx и .xml</p>
                <input type="file" id="fileInput" accept="*/*">
            </div>
            <div class="conteiner">
                <input type="text" id="urlInput" placeholder="https://example.com или любой адрес" autocomplete="off">
                <button class="clearUrlBtn" id="clearUrlBtn">Очистить</button>
            </div>
            <div class="conteiner">
                <button class="submitBtn" id="submitBtn">Отправить</button>
            </div>
            <div class="outputArea">
                <p>Результат или ошибки:</p>
                <div id="outputContent">
                    <p>- здесь появится информация об отправленных данных -</p>
                </div>
            </div>
        </div>
        <footer></footer>
        <script>
    let file = null;
    let urlValue = "";

    const fileInput = document.getElementById('fileInput');
    const urlInput = document.getElementById('urlInput');
    const clearUrlBtn = document.getElementById('clearUrlBtn');
    const submitBtn = document.getElementById('submitBtn');
    const outputContent = document.getElementById('outputContent');

    fileInput.addEventListener('change', function(event) {
        file = event.target.files[0];
    });

    urlInput.addEventListener('input', function(event) {
        urlValue = event.target.value;
    });

    clearUrlBtn.addEventListener('click', function() {
        urlInput.value = '';
        urlValue = '';
    });

    function showError(message) {
        outputContent.innerHTML = `<div class="error" style="color: #d32f2f; padding: 12px; background: #ffebee; border-radius: 4px; border-left: 4px solid #d32f2f; margin: 10px 0;">
            <strong>Ошибка:</strong> ${message}
        </div>`;
    }

    function showSuccess(message) {
        outputContent.innerHTML = `<div class="success" style="color: #2e7d32; padding: 12px; background: #e8f5e9; border-radius: 4px; border-left: 4px solid #2e7d32; margin: 10px 0;">
            ${message}
        </div>`;
    }

    function showLoading() {
        outputContent.innerHTML = `<div class="loading" style="padding: 12px; background: #e3f2fd; border-radius: 4px;">
            ⏳ Отправка данных на сервер...
        </div>`;
    }

    async function sendToServer(url, fileData) {
        const formData = new FormData();

        if (!fileData) {
            throw new Error('Файл не выбран');
        }

        if (!url || url.trim() === '') {
            throw new Error('URL не указан');
        }

        formData.append('file', fileData);
        const encodedUrl = encodeURIComponent(url.trim());
        const apiUrl = `/api/compare/json?url=${encodedUrl}`;

        const response = await fetch(apiUrl, {
            method: 'POST',
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        });

        if (!response.ok) {
            let errorMessage = `Ошибка ${response.status}`;
            try {
                const errorData = await response.json();
                if (errorData.detail) {
                    errorMessage = errorData.detail;
                } else if (errorData.message) {
                    errorMessage = errorData.message;
                }
            } catch (e) {
                const textError = await response.text();
                if (textError) {
                    errorMessage = textError.substring(0, 200);
                }
            }

            errorMessage = errorMessage
                .replace(/^["']|["']$/g, '')
                .replace(/[{}[\]"']/g, '')
                .trim();

            throw new Error(errorMessage);
        }

        return await response.json();
    }

    submitBtn.addEventListener('click', async function() {
        const currentUrl = urlInput.value.trim();

        if (!currentUrl) {
            showError('Укажите URL адрес');
            return;
        }

        if (!file) {
            showError('Выберите файл для загрузки');
            return;
        }

        if (file.size > 10 * 1024 * 1024) {
            showError('Файл превышает 10 МБ');
            return;
        }

        showLoading();

        try {
            const result = await sendToServer(currentUrl, file);

            if (!result) {
                throw new Error('Сервер не вернул данных');
            }

            // Сохраняем только JSON результат
            localStorage.setItem('compareResult', JSON.stringify(result));

            showSuccess('Анализ выполнен успешно');

            setTimeout(() => {
                window.location.href = 'page3_result.html';
            }, 500);

        } catch (error) {
            let errorMessage = error.message;

            errorMessage = errorMessage
                .replace(/^["']|["']$/g, '')
                .replace(/[{}[\]"']/g, '')
                .trim();

            showError(errorMessage);

            console.error('Детали ошибки:', {
                url: currentUrl,
                file: file ? file.name : null,
                error: error.message
            });
        }
    });
</script>
    
    </body>
</html>
