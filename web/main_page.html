<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Сравнивание файлов и данных</title>
        <link rel="stylesheet" href="css/global.css">
    </head>
    <body>
        <header class="main">
            <a href="https://mauniver.ru/" ><img class="head" src="pic/logo.PNG" alt="Главная страница"></a>
            <div class="right">
                
            </div>
        </header>
        <div class="content">
            <header>
                <h1>Загрузите данные</h1>
                <p>Вставьте файл с учебным планом и ссылку страницы с данными</p>
            </header>
            <div class="conteiner">
                <p>Поддерживаются любые форматы (max. 50 МБ)</p>
                <input type="file" id="fileInput" accept="*/*">
            </div>
            <div class="conteiner">
                <input type="text" id="urlInput" placeholder="https://example.com или любой адрес" autocomplete="off">
                <button class="clearUrlBtn" id="clearUrlBtn">Очистить</button>
            </div>
            <div class="conteiner" style="display: flex; align-items: center; gap: 15px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14pt;">
                    <input type="checkbox" id="downloadFilesCheckbox" style="width: 18px; height: 18px; cursor: pointer;">
                    <span>Скачать PDF и HTML версии результата</span>
                </label>
            </div>
            <div class="conteiner">
                <button class="submitBtn" id="submitBtn">Отправить</button>
            </div>
            <div class="outputArea">
                <p>Результат или ошибки:</p>
                <div id="outputContent">
                    <p>- здесь появится информация об отправленных данных -</p>
                </div>
            </div>      
        </div>
        <footer></footer>
        <script>
            let file = null;
            let urlValue = "";

            const fileInput = document.getElementById('fileInput');  
            const urlInput = document.getElementById('urlInput');    
            const clearUrlBtn = document.getElementById('clearUrlBtn');
            const submitBtn = document.getElementById('submitBtn');
            const outputContent = document.getElementById('outputContent');
            const downloadFilesCheckbox = document.getElementById('downloadFilesCheckbox');

            fileInput.addEventListener('change', function(event) {
                file = event.target.files[0];
                console.log('Файл изменен:', file ? file.name : 'удален');
            });

            urlInput.addEventListener('input', function(event) {
                urlValue = event.target.value; 
                console.log('URL изменен:', urlValue);
            });

            clearUrlBtn.addEventListener('click', function() {
                urlInput.value = '';     
                urlValue = '';           
                console.log('URL очищен');
            });

            function showError(message) {
                outputContent.innerHTML = `<div class="error">Ошибка: ${message}</div>`;
            }
            
            function showSuccess(message) {
                outputContent.innerHTML = `<div class="success">${message}</div>`;
            }
            
            function showLoading() {
                outputContent.innerHTML = `<div class="loading">Отправка данных на сервер...</div>`;
            }
            
            function showResult(data) {
                localStorage.setItem('compareResult', JSON.stringify(data));
                window.location.href = 'page3_result.html';
            }

            // Функция для скачивания файла
            function downloadFile(content, filename, contentType) {
                const blob = new Blob([content], { type: contentType });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            // Функция для скачивания PDF и HTML с сервера
            async function downloadResultFiles() {
                try {
                    const savedResult = localStorage.getItem('compareResult');
                    if (!savedResult) {
                        console.warn('Нет сохраненного результата для скачивания');
                        return false;
                    }

                    const resultData = JSON.parse(savedResult);
                    
                    // Получаем уникальный идентификатор для файлов (например, время или название специальности)
                    const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                    const specialtyName = resultData.specialty ? resultData.specialty.replace(/[^a-zа-яё0-9]/gi, '_').substring(0, 50) : 'result';
                    
                    // Формируем запрос на получение PDF
                    const pdfResponse = await fetch('http://127.0.0.1:8001/api/compare/pdf', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/pdf'
                        },
                        body: JSON.stringify(resultData)
                    });
                    
                    if (pdfResponse.ok) {
                        const pdfBlob = await pdfResponse.blob();
                        const pdfUrl = URL.createObjectURL(pdfBlob);
                        downloadFile(pdfBlob, `${specialtyName}_${timestamp}_result.pdf`, 'application/pdf');
                        URL.revokeObjectURL(pdfUrl);
                        console.log('PDF скачан успешно');
                    } else {
                        console.error('Ошибка при скачивании PDF:', pdfResponse.status);
                    }
                    
                    // Формируем запрос на получение HTML
                    const htmlResponse = await fetch('http://127.0.0.1:8001/api/compare/html', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'text/html'
                        },
                        body: JSON.stringify(resultData)
                    });
                    
                    if (htmlResponse.ok) {
                        const htmlContent = await htmlResponse.text();
                        downloadFile(htmlContent, `${specialtyName}_${timestamp}_result.html`, 'text/html');
                        console.log('HTML скачан успешно');
                    } else {
                        console.error('Ошибка при скачивании HTML:', htmlResponse.status);
                    }
                    
                    return true;
                } catch (error) {
                    console.error('Ошибка при скачивании файлов результата:', error);
                    return false;
                }
            }

            async function sendToServer(url, fileData, shouldDownloadFiles) {
                const formData = new FormData();    
                
                if (fileData) {
                    formData.append('file', fileData);
                } else {
                    throw new Error('Файл не выбран');
                }
                
                if (!url || url.trim() === '') {
                    throw new Error('URL не указан');
                }
                
                const encodedUrl = encodeURIComponent(url.trim());
                const apiUrl = `http://localhost:8000/api/compare/json?url=${encodedUrl}`;
                
                console.log('Отправка запроса на:', apiUrl);
                console.log('FormData содержимое:', formData);
                console.log('Скачивать файлы:', shouldDownloadFiles);
                
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        body: formData,
                        mode: 'cors',
                        credentials: 'omit',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    console.log('Статус ответа:', response.status);
                    console.log('Заголовки ответа:', response.headers);
                    
                    if (!response.ok) {
                        let errorMessage = `HTTP ошибка! статус: ${response.status}`;
                        try {
                            const errorData = await response.text();
                            console.error('Тело ошибки:', errorData);
                            errorMessage += `, детали: ${errorData.substring(0, 200)}`;
                        } catch (e) {
                            console.error('Не удалось прочитать тело ошибки:', e);
                        }
                        throw new Error(errorMessage);
                    }
                    
                    const result = await response.json();
                    console.log('Ответ сервера:', result);
                    return result;
                    
                } catch (error) {
                    console.error('Ошибка при отправке запроса:', error);
                    
                    let detailedError = error.message;
                    
                    if (error.message.includes('Failed to fetch')) {
                        detailedError = 'Не удалось подключиться к серверу. Проверьте: \n' +
                                      '1. Запущен ли сервер на http://127.0.0.1:8001\n' +
                                      '2. Нет ли блокировки CORS (запустите сервер с CORS middleware)\n' +
                                      '3. Правильный ли порт и адрес\n' +
                                      `Оригинальная ошибка: ${error.message}`;
                    } else if (error.message.includes('NetworkError')) {
                        detailedError = 'Сетевая ошибка. Убедитесь, что сервер доступен по адресу http://127.0.0.1:8001';
                    }
                    
                    throw new Error(detailedError);
                }
            }

            submitBtn.addEventListener('click', async function() {
                let fileName = file ? file.name : 'Файл не выбран';
                let currentUrl = urlInput.value.trim();
                let shouldDownload = downloadFilesCheckbox.checked;
                
                if (!currentUrl) {
                    showError('Пожалуйста, укажите URL');
                    outputContent.innerHTML += `<div class="info-data">URL: не указан<br>Название файла: ${fileName}</div>`;
                    return;
                }
                
                if (!file) {
                    showError('Пожалуйста, выберите файл');
                    outputContent.innerHTML += `<div class="info-data">URL: ${currentUrl}<br>Файл не выбран</div>`;
                    return;
                }
                
                if (file.size > 50 * 1024 * 1024) {
                    showError('Файл слишком большой. Максимальный размер 50 МБ');
                    return;
                }
                
                showLoading();
                
                try {
                    const result = await sendToServer(currentUrl, file, shouldDownload);
                    
                    if (result) {
                        // Сохраняем результат в localStorage для страницы результатов
                        localStorage.setItem('compareResult', JSON.stringify(result));
                        
                        // Если пользователь выбрал скачивание файлов
                        if (shouldDownload) {
                            showSuccess('Данные успешно отправлены! Идет скачивание файлов результата...');
                            
                            // Небольшая задержка перед скачиванием
                            setTimeout(async () => {
                                const downloadSuccess = await downloadResultFiles();
                                if (downloadSuccess) {
                                    showSuccess('Данные успешно отправлены! Файлы PDF и HTML скачаны. Перенаправление...');
                                } else {
                                    showSuccess('Данные успешно отправлены! Но возникла ошибка при скачивании файлов. Перенаправление...');
                                }
                                
                                setTimeout(() => {
                                    window.location.href = 'page3_result.html';
                                }, 1500);
                            }, 500);
                        } else {
                            showSuccess('Данные успешно отправлены! Перенаправление...');
                            setTimeout(() => {
                                window.location.href = 'page3_result.html';
                            }, 1000);
                        }
                    } else {
                        throw new Error('Сервер вернул пустой результат');
                    }
                    
                } catch (error) {
                    showError(error.message);
                    
                    console.error('Детали ошибки:', {
                        url: currentUrl,
                        file: file ? { name: file.name, size: file.size, type: file.type } : null,
                        error: error,
                        errorStack: error.stack
                    });
                    
                    outputContent.innerHTML += `
                        <div class="sent-data">
                            <strong>Отправленные данные:</strong><br>
                            URL: ${currentUrl}<br>
                            Файл: ${fileName}<br>
                            Размер файла: ${(file.size / 1024).toFixed(2)} КБ
                        </div>
                        <div class="tips">
                            <strong>Советы по устранению проблемы:</strong><br>
                            1. Убедитесь, что сервер запущен: <code>python entypoint.py</code><br>
                            2. Проверьте, что сервер слушает порт 8001<br>
                            3. Добавьте CORS middleware в FastAPI приложение:<br>
                            <code>from fastapi.middleware.cors import CORSMiddleware</code><br>
                            <code>app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])</code><br>
                            4. Проверьте, что URL корректен и доступен<br>
                            5. Проверьте, что прикрепленный файл корректен
                        </div>
                    `;
                }
            });
        </script>
    </body>
</html>
