<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Сравнивание файлов и данных</title>
        <link rel="stylesheet" href="css/global.css">
    </head>
    <body>
        <div class="content">
            <header>
                <h1>Загрузите данные</h1>
                <p>Вставьте файл с учебным планом и ссылку страницы с данными</p>
            </header>
            <div class="conteiner">
                <p>Поддерживаются любые форматы (max. 50 МБ)</p>
                <input type="file" id="fileInput" accept="*/*">
            </div>
            <div class="conteiner">
                <input type="text" id="urlInput" placeholder="https://example.com или любой адрес" autocomplete="off">
                <button class="clearUrlBtn" id="clearUrlBtn">X Очистить</button>
            </div>
            <div class="conteiner">
                <button class="submitBtn" id="submitBtn">Отправить</button>
            </div>
            <div class="outputArea">
                <p>Результат:</p>
                <div id="outputContent">
                    - здесь появиться инфа об отправленных данных -
                </div>
            </div>      
        </div>
        <script>
            let file = null;
            let urlValue = "";

            const fileInput = document.getElementById('fileInput');  
            const urlInput = document.getElementById('urlInput');    
            const clearUrlBtn = document.getElementById('clearUrlBtn');
            const submitBtn = document.getElementById('submitBtn');
            const outputContent = document.getElementById('outputContent');

            fileInput.addEventListener('change', function(event) {
                file = event.target.files[0];
                console.log('Файл изменен:', file ? file.name : 'удален');
            });

            urlInput.addEventListener('input', function(event) {
                urlValue = event.target.value; 
                console.log('URL изменен:', urlValue);
            });

            clearUrlBtn.addEventListener('click', function() {
                urlInput.value = '';     
                urlValue = '';           
                console.log('URL очищен');
            });

            function showError(message) {
                outputContent.innerHTML = `<div class="error">Ошибка: ${message}</div>`;
            }
            
            function showSuccess(data) {
                outputContent.innerHTML = `
                    <div class="success">Данные успешно отправлены!</div>
                    <pre class="response-data">${JSON.stringify(data, null, 2)}</pre>
                `;
            }
            // Функция для отправки данных на сервер
            async function sendToServer(url, fileData) {
                const formData = new FormData();
                
                formData.append('url', url);
            
                if (fileData) {
                    formData.append('file', fileData);
                }
                
                try {
                    const response = await fetch('http://127.0.0.1:8000/api/compare/json', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    console.log('Ответ сервера:', result);
                    return result;
                    
                } catch (error) {
                    console.error('Ошибка при отправке:', error);
                    throw error;
                }
            }

            // Обработчик кнопки "Отправить"
            submitBtn.addEventListener('click', async function() {
                let fileName = file ? file.name : 'Файл не выбран';
                let currentUrl = urlInput.value.trim() !== '' ? urlInput.value : 'URL не указан';
                urlValue = urlInput.value;

                try {
                    
                    const result = await sendToServer(currentUrl, file);
                    // Отображаем успешный результат
                    showSuccess(result);
                    
                } catch (error) {
                    // Отображаем ошибку
                    showError(error.message);
                    
                    // Дополнительная информация в консоль
                    console.error('Детали ошибки:', {
                        url: currentUrl,
                        file: file ? file.name : null,
                        error: error
                    });
                }
            
                
                const outputText = `URL: ${currentUrl}\nНазвание файла: ${fileName}`;
                outputContent.innerText = outputText;
                
                console.log('Отправлено -> URL:', currentUrl, '| Файл:', fileName);
            });
        </script>
    </body>
</html>
