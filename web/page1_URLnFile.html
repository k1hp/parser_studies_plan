<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Сравнивание файлов и данных</title>
        <link rel="stylesheet" href="css/global.css">
    </head>
    <body>
        <div class="content">
            <header>
                <h1>Загрузите данные</h1>
                <p>Вставьте файл с учебным планом и ссылку страницы с данными</p>
            </header>
            <div class="conteiner">
                <p>Поддерживаются любые форматы (max. 50 МБ)</p>
                <input type="file" id="fileInput" accept="*/*">
            </div>
            <div class="conteiner">
                <input type="text" id="urlInput" placeholder="https://example.com или любой адрес" autocomplete="off">
                <button class="clearUrlBtn" id="clearUrlBtn">X Очистить</button>
            </div>
            <div class="conteiner">
                <button class="submitBtn" id="submitBtn">Отправить</button>
            </div>
            <div class="outputArea">
                <p>Результат:</p>
                <div id="outputContent">
                    - здесь появиться инфа об отправленных данных -
                </div>
            </div>      
        </div>
        <script>
            let file = null;
            let urlValue = "";

            const fileInput = document.getElementById('fileInput');  
            const urlInput = document.getElementById('urlInput');    
            const clearUrlBtn = document.getElementById('clearUrlBtn');
            const submitBtn = document.getElementById('submitBtn');
            const outputContent = document.getElementById('outputContent');

            fileInput.addEventListener('change', function(event) {
                file = event.target.files[0];
                console.log('Файл изменен:', file ? file.name : 'удален');
            });

            urlInput.addEventListener('input', function(event) {
                urlValue = event.target.value; 
                console.log('URL изменен:', urlValue);
            });

            clearUrlBtn.addEventListener('click', function() {
                urlInput.value = '';     
                urlValue = '';           
                console.log('URL очищен');
            });

            // Обработчик кнопки "Отправить"
            submitBtn.addEventListener('click', function() {
                let fileName = file ? file.name : 'Файл не выбран';
                let currentUrl = urlInput.value.trim() !== '' ? urlInput.value : 'URL не указан';
                urlValue = urlInput.value;
                
                const outputText = `URL: ${currentUrl}\nНазвание файла: ${fileName}`;
                outputContent.innerText = outputText;
                
                console.log('Отправлено -> URL:', currentUrl, '| Файл:', fileName);
            });
        </script>
    </body>
</html>
