<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: DejaVu Sans, sans-serif; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>
    <h1>Отчет по направлению: {{ specialty }}</h1>
    <p>Форма обучения: {{ form_education }} | Год: {{ curriculum_year }}</p>

    <table>
    <thead>
        <tr>
            <th>Код</th>
            <th>Название дисциплины</th>
        </tr>
    </thead>
    <tbody>
        {% for disc in disciplines %}
        <tr>
            <td>{{ disc.discipline_code or '-' }}</td>
            <td>{{ disc.discipline_name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
